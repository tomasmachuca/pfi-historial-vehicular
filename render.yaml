# Blueprint de Render para el backend FastAPI.
# En Render: New > Blueprint > seleccionar este repo. Los env con sync:false
# se cargan a mano en el dashboard (secretos, no van al repo).
services:
  - type: web
    name: historial-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      # --- Públicos (blockchain testnet Amoy) ---
      - key: RPC_URL
        value: https://polygon-amoy-bor-rpc.publicnode.com
      - key: CHAIN_ID
        value: "80002"
      - key: CONTRACT_ADDRESS
        value: "0xEF9c8Cec5453047a92bd83889C8148C541176fa0"
      - key: R2_BUCKET
        value: historial-evidencias
      # --- Secretos y valores por entorno (cargar en el dashboard) ---
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false
      - key: ADMIN_PRIVATE_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      # URL del frontend en Vercel, para CORS (ej. https://tu-app.vercel.app)
      - key: FRONTEND_ORIGIN
        sync: false
