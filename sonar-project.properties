# ============================================================
# Configuracion de SonarCloud - PFI Historial Vehicular
# Reemplazar los dos primeros valores con los datos reales
# que genera SonarCloud al importar el repositorio.
# ============================================================
sonar.organization=tomasmachuca
sonar.projectKey=tomasmachuca_pfi-historial-vehicular
sonar.projectName=PFI - Sistema de Historial Vehicular Verificable

# Rutas de origen y exclusion (estructura monorepo)
sonar.sources=backend/app,frontend/src,contracts/contracts
sonar.tests=backend/tests,frontend/src/__tests__,contracts/test
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/artifacts/**,**/cache/**,**/*.config.js,**/migrations/**

# Codificacion
sonar.sourceEncoding=UTF-8

# Reportes de cobertura (rutas donde el pipeline descarga los artefactos)
sonar.python.coverage.reportPaths=coverage-backend/coverage.xml
sonar.javascript.lcov.reportPaths=coverage-frontend/lcov.info

# Version de Python del proyecto
sonar.python.version=3.11
