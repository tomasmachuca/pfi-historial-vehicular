name: Pipeline de Integración Continua (CI)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ============================================
  # BACKEND - FastAPI (Python)
  # ============================================
  backend:
    name: Backend - Lint y Tests (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Descargar codigo fuente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar entorno de Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias del proyecto
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Ejecutar Linter (Verificacion de Estilo)
        run: ruff check .

      - name: Ejecutar Suite de Tests Automatizados
        run: pytest --cov=app --cov-report=xml --cov-report=term

      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage.xml

  # ============================================
  # FRONTEND - React (Node.js)
  # ============================================
  frontend:
    name: Frontend - Lint y Tests (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Descargar codigo fuente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar entorno de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias del proyecto
        run: npm ci

      - name: Ejecutar Linter (Verificacion de Estilo)
        run: npm run lint

      - name: Ejecutar Suite de Tests Automatizados
        run: npm test -- --coverage

      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/lcov.info

  # ============================================
  # SMART CONTRACTS - Solidity (Hardhat)
  # ============================================
  contracts:
    name: Smart Contracts - Compilacion y Tests (Solidity)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Descargar codigo fuente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar entorno de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json

      - name: Instalar dependencias del proyecto
        run: npm ci

      - name: Compilar contratos
        run: npx hardhat compile

      - name: Ejecutar Tests de Contratos
        run: npx hardhat test

 
